<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vũ Trụ Độc Hành</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌑</text></svg>">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg: #03030a;
      --card: rgba(255, 255, 255, 0.03);
      --accent: #a5b4fc;
      --text: #e2e8f0;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Hiệu ứng nền vũ trụ động */
    .nebula {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: 
        radial-gradient(circle at 20% 30%, rgba(110, 168, 254, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      z-index: -1;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 4rem 3rem;
      max-width: 600px;
      width: 90%;
      text-align: center;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-style: italic;
      background: linear-gradient(to bottom, #fff, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    #slogan {
      font-size: 1.2rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 2rem;
      min-height: 80px;
      font-weight: 300;
    }

    .input-group {
      position: relative;
      margin-top: 2rem;
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.2rem;
      color: white;
      font-size: 1rem;
      resize: none;
      outline: none;
      transition: all 0.4s ease;
    }

    textarea:focus {
      background: rgba(255,255,255,0.08);
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(165, 180, 252, 0.1);
    }

    button {
      margin-top: 1.5rem;
      background: #fff;
      color: #000;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 100px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
      background: var(--accent);
    }

    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.3;
    }

    /* Animation cho text mới xuất hiện */
    .fade-in {
      animation: fadeIn 1s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="nebula"></div>

  <div class="card">
    <h1 id="title-main">Không anh em.<br>Không bạn.</h1>
    
    <div id="slogan">Đang kết nối với hư vô...</div>

    <div class="input-group">
      <textarea id="newSlogan" rows="3" placeholder="Gửi một lời nhắn vào khoảng không..."></textarea>
      <br>
      <button id="saveBtn">
        <span>Lưu vào vũ trụ</span>
        <i data-lucide="send" size="18"></i>
      </button>
    </div>
    
    <div id="status" style="margin-top: 1rem; font-size: 0.8rem;"></div>
  </div>

  <footer>Silence &bull; 2026</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, limitToLast, onChildAdded } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://bigdata-c9bd2-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const sloganRef = ref(db, "slogan");

    const sloganEl = document.getElementById("slogan");
    const textarea = document.getElementById("newSlogan");
    const saveBtn = document.getElementById("saveBtn");
    const statusEl = document.getElementById("status");

    // Khởi tạo Lucide icons
    lucide.createIcons();

    // Lắng nghe dữ liệu mới nhất
    const recentQuery = limitToLast(sloganRef, 1);
    onChildAdded(sloganRef, (data) => {
      const val = data.val();
      if (val && val.text) {
        sloganEl.classList.remove('fade-in');
        void sloganEl.offsetWidth; // Trigger reflow
        sloganEl.textContent = `"${val.text}"`;
        sloganEl.classList.add('fade-in');
      }
    });

    // Lưu dữ liệu
    saveBtn.onclick = async () => {
      const text = textarea.value.trim();
      if (!text) return;

      try {
        await push(sloganRef, {
          text,
          timestamp: Date.now()
        });
        textarea.value = "";
        statusEl.textContent = "Lời nhắn đã tan vào hư không.";
        statusEl.style.color = "#a5b4fc";
        setTimeout(() => statusEl.textContent = "", 3000);
      } catch (e) {
        statusEl.textContent = "Hư vô từ chối bạn.";
        statusEl.style.color = "#ef4444";
      }
    };
  </script>
</body>
</html>
